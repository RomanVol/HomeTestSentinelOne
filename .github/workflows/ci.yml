name: Prompt Security Extension Policy Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  playwright:
    runs-on: ubuntu-latest
    env:
      HOME_TEST_EXTENSION_MODE: ${{ vars.HOME_TEST_EXTENSION_MODE || 'unpacked' }}
      HOME_TEST_EXTENSION_PATH: ${{ vars.HOME_TEST_EXTENSION_PATH || './extension-artifact/prompt-security' }}
      HOME_TEST_EXTENSION_ID: ${{ vars.HOME_TEST_EXTENSION_ID || 'iidnankcocecmgpcafggbgbmkbcldmno' }}
      HOME_TEST_EXTENSION_POPUP_PATH: ${{ vars.HOME_TEST_EXTENSION_POPUP_PATH || 'html/popup.html' }}
      HOME_TEST_CHROME_CHANNEL: ${{ vars.HOME_TEST_CHROME_CHANNEL || 'chromium' }}
      HOME_TEST_EDGE_CHANNEL: ${{ vars.HOME_TEST_EDGE_CHANNEL || 'msedge' }}
      HOME_TEST_API_DOMAIN: ${{ vars.HOME_TEST_API_DOMAIN || 'eu.prompt.security' }}
      HOME_TEST_API_KEY: ${{ secrets.HOME_TEST_API_KEY || 'cc6a6cfc-9570-4e5a-b6ea-92d2adac90e4' }}
      HOME_TEST_EXPECTED_USER_EMAIL: ${{ vars.HOME_TEST_EXPECTED_USER_EMAIL || 'romavolman@gmail.com' }}
      HOME_TEST_TARGET_BROWSERS: ${{ vars.HOME_TEST_TARGET_BROWSERS || 'chrome-extension,edge-extension,firefox-extension,safari-extension' }}
      HOME_TEST_BLOCK_TEXTS: ${{ vars.HOME_TEST_BLOCK_TEXTS || 'Access Denied,blocked by your administrator' }}
      HOME_TEST_LOG_DOWNLOAD_DIR: ${{ vars.HOME_TEST_LOG_DOWNLOAD_DIR || '/home/runner/Downloads' }}
      HOME_TEST_LOG_FILE_NAME: ${{ vars.HOME_TEST_LOG_FILE_NAME || 'prompt_security_extension_debug_logs.txt' }}
      HOME_TEST_LOG_ASSERTIONS: ${{ vars.HOME_TEST_LOG_ASSERTIONS || 'gemini.google.com,Blocking access to domain gemini.google.com' }}
      HOME_TEST_CLEARED_LOG_ASSERTIONS: ${{ vars.HOME_TEST_CLEARED_LOG_ASSERTIONS || 'gemini.google.com,Blocking access to domain gemini.google.com' }}
      HOME_TEST_LOG_TEST_APPLICATION_KEY: ${{ vars.HOME_TEST_LOG_TEST_APPLICATION_KEY || 'gemini' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit msedge

      - name: Run policy suite
        run: npx playwright test --reporter=line
